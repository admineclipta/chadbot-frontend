server {
  listen 8080;
  server_name _;
  absolute_redirect off;
  port_in_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  # Cache agresivo para assets versionados (Next export suele generar rutas estables)
  location /_next/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA fallback: cualquier ruta (ej /login) devuelve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
